<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>水果忍者</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: radial-gradient(circle, #4a3622 0%, #1a1005 100%);
        font-family: "Arial", sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }

      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background-image: repeating-linear-gradient(
          45deg,
          rgba(0, 0, 0, 0.1) 0px,
          rgba(0, 0, 0, 0.1) 2px,
          transparent 2px,
          transparent 4px
        );
      }

      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .score-container {
        position: absolute;
        top: 20px;
        left: 30px;
        font-size: 40px;
        color: #fff;
        font-weight: 900;
        text-shadow:
          2px 2px 0px #000,
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          3px 3px 5px rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .score-icon {
        font-size: 45px;
      }

      #combo-text {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 60px;
        color: #ffdd00;
        font-weight: 900;
        font-style: italic;
        text-shadow:
          0 0 20px #ff5500,
          3px 3px 0 #000,
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000;
        opacity: 0;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        pointer-events: none;
      }

      #combo-text.show {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 1;
      }

      #start-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        pointer-events: auto;
        z-index: 10;
        backdrop-filter: blur(5px);
        transition: opacity 0.5s ease;
      }

      #start-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #start-screen h1 {
        color: #ffdd00;
        font-size: 80px;
        margin-bottom: 60px;
        text-shadow:
          0 10px 20px rgba(0, 0, 0, 0.8),
          3px 3px 0 #cc4400,
          -2px -2px 0 #cc4400,
          2px -2px 0 #cc4400,
          -2px 2px 0 #cc4400;
        font-weight: 900;
        letter-spacing: 5px;
        text-align: center;
      }

      #start-btn {
        padding: 20px 60px;
        font-size: 36px;
        font-weight: bold;
        background: linear-gradient(180deg, #ffb700 0%, #ff6600 100%);
        color: white;
        border: 4px solid #fff;
        border-radius: 50px;
        cursor: pointer;
        box-shadow:
          0 8px 0 #cc4400,
          0 15px 30px rgba(0, 0, 0, 0.6),
          inset 0 2px 5px rgba(255, 255, 255, 0.5);
        transition:
          transform 0.1s,
          box-shadow 0.1s;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      #start-btn:active {
        transform: translateY(8px);
        box-shadow:
          0 0 0 #cc4400,
          0 5px 15px rgba(0, 0, 0, 0.6),
          inset 0 2px 5px rgba(255, 255, 255, 0.5);
      }

      @keyframes shake {
        0% {
          transform: translate(2px, 2px) rotate(0deg);
        }
        10% {
          transform: translate(-2px, -3px) rotate(-1deg);
        }
        20% {
          transform: translate(-4px, 0px) rotate(1deg);
        }
        30% {
          transform: translate(4px, 3px) rotate(0deg);
        }
        40% {
          transform: translate(2px, -2px) rotate(1deg);
        }
        50% {
          transform: translate(-2px, 3px) rotate(-1deg);
        }
        60% {
          transform: translate(-4px, 2px) rotate(0deg);
        }
        70% {
          transform: translate(4px, 2px) rotate(-1deg);
        }
        80% {
          transform: translate(-2px, -2px) rotate(1deg);
        }
        90% {
          transform: translate(2px, 3px) rotate(0deg);
        }
        100% {
          transform: translate(2px, -3px) rotate(-1deg);
        }
      }

      .shake {
        animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="ui-layer">
        <div class="score-container">
          <span class="score-icon">🍉</span>
          <span id="score">0</span>
        </div>
        <div id="combo-text">COMBO!</div>
      </div>
      <div id="start-screen">
        <h1>水果忍者</h1>
        <button id="start-btn">開始遊戲</button>
      </div>
    </div>
    <script>
      const canvas = document.getElementById("game-canvas");
      const ctx = canvas.getContext("2d");
      const scoreElement = document.getElementById("score");
      const startScreen = document.getElementById("start-screen");
      const startBtn = document.getElementById("start-btn");
      const comboText = document.getElementById("combo-text");
      const gameContainer = document.getElementById("game-container");

      let width, height;
      let score = 0;
      let isPlaying = false;
      let animationId;

      // Game Arrays
      let fruits = [];
      let particles = [];
      let trail = [];

      // Mouse tracking
      let mouse = { x: 0, y: 0 };
      let lastMouse = { x: 0, y: 0 };

      const FRUITS_CONFIG = [
        { emoji: "🍉", color: "#ff3366", size: 150 },
        { emoji: "🍎", color: "#ff3333", size: 150 },
        { emoji: "🍊", color: "#ff9900", size: 150 },
        { emoji: "🍋", color: "#ffff00", size: 150 },
        { emoji: "🥝", color: "#33cc33", size: 150 },
        { emoji: "🍇", color: "#9933ff", size: 150 },
        { emoji: "🍍", color: "#ffcc00", size: 150 },
      ];

      // Pre-render emojis to canvas for halves rendering
      const preRenderedFruits = FRUITS_CONFIG.map((config) => {
        const c = document.createElement("canvas");
        c.width = config.size + 40; // Padding
        c.height = config.size + 40;
        const cx = c.getContext("2d");
        cx.font = `${config.size}px Arial`;
        cx.textAlign = "center";
        cx.textBaseline = "middle";
        // shadow for 3d effect
        cx.shadowColor = "rgba(0,0,0,0.3)";
        cx.shadowBlur = 10;
        cx.shadowOffsetX = 5;
        cx.shadowOffsetY = 5;
        cx.fillText(config.emoji, c.width / 2, c.height / 2 + 5); // +5 for visual center adjustment
        return { ...config, canvas: c, imgWidth: c.width, imgHeight: c.height };
      });

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }

      window.addEventListener("resize", resize);
      resize();

      // Utilities
      function dist2(v, w) {
        return (v.x - w.x) ** 2 + (v.y - w.y) ** 2;
      }
      function distToSegmentSquared(p, v, w) {
        let l2 = dist2(v, w);
        if (l2 === 0) return dist2(p, v);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return dist2(p, { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) });
      }

      // Classes
      class Particle {
        constructor(x, y, color) {
          this.x = x;
          this.y = y;
          this.vx = (Math.random() - 0.5) * 15;
          this.vy = (Math.random() - 0.5) * 15;
          this.life = 1;
          this.decay = Math.random() * 0.02 + 0.015;
          this.color = color;
          this.size = Math.random() * 6 + 3;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.vy += 0.3; // Gravity
          this.life -= this.decay;
        }
        draw(ctx) {
          ctx.globalAlpha = Math.max(0, this.life);
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      class Fruit {
        constructor() {
          this.type =
            preRenderedFruits[
              Math.floor(Math.random() * preRenderedFruits.length)
            ];
          this.radius = this.type.size / 2;
          this.x = Math.random() * (width - this.radius * 2) + this.radius;
          this.y = height + this.radius + 50;

          // Target towards the center upper area slightly
          const targetX = width / 2 + (Math.random() - 0.5) * 400;
          const dx = targetX - this.x;

          this.vx = dx * 0.01 + (Math.random() - 0.5) * 2;
          this.vy = -(Math.random() * 6 + 14); // Throw up

          this.rotation = Math.random() * Math.PI * 2;
          this.rotationSpeed = (Math.random() - 0.5) * 0.1;
          this.isSliced = false;

          // For halves
          this.halfVX = 0;
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.vy += 0.25; // Gravity
          this.rotation += this.rotationSpeed;

          if (this.isSliced) {
            // Apply separation to halves
            this.x -= this.halfVX;
            // We use x for left half and x + something for right half in draw
          }
        }

        draw(ctx) {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);

          if (!this.isSliced) {
            ctx.drawImage(
              this.type.canvas,
              -this.type.imgWidth / 2,
              -this.type.imgHeight / 2,
            );
          } else {
            // Draw left half
            ctx.save();
            ctx.translate(-this.halfVX * 10, 0); // move apart over time
            ctx.rotate(-this.halfVX * 0.1);
            ctx.drawImage(
              this.type.canvas,
              0,
              0,
              this.type.imgWidth / 2,
              this.type.imgHeight,
              -this.type.imgWidth / 2,
              -this.type.imgHeight / 2,
              this.type.imgWidth / 2,
              this.type.imgHeight,
            );
            ctx.restore();

            // Draw right half
            ctx.save();
            ctx.translate(this.halfVX * 10, 0);
            ctx.rotate(this.halfVX * 0.1);
            ctx.drawImage(
              this.type.canvas,
              this.type.imgWidth / 2,
              0,
              this.type.imgWidth / 2,
              this.type.imgHeight,
              0,
              -this.type.imgHeight / 2,
              this.type.imgWidth / 2,
              this.type.imgHeight,
            );
            ctx.restore();

            this.halfVX += 0.2; // Increase separation speed
          }

          ctx.restore();
        }
      }

      // Input Handlers
      window.addEventListener("mousemove", (e) => {
        lastMouse = { ...mouse };
        mouse.x = e.clientX;
        mouse.y = e.clientY;

        // Add to trail
        trail.push({ x: mouse.x, y: mouse.y, age: 1 });
      });

      // Also support touch for mobile
      window.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          lastMouse = { ...mouse };
          mouse.x = e.touches[0].clientX;
          mouse.y = e.touches[0].clientY;
          trail.push({ x: mouse.x, y: mouse.y, age: 1 });
        },
        { passive: false },
      );

      function showCombo(amount) {
        if (amount < 2) return;
        comboText.innerText = `COMBO x${amount}!`;
        comboText.classList.add("show");

        // Slight screen shake
        gameContainer.classList.remove("shake");
        void gameContainer.offsetWidth; // trigger reflow
        gameContainer.classList.add("shake");

        setTimeout(() => {
          comboText.classList.remove("show");
        }, 1000);
      }

      function spawnFruit() {
        if (!isPlaying) return;

        const count = Math.floor(Math.random() * 3) + 1; // Spawn 1-3 fruits at once
        for (let i = 0; i < count; i++) {
          setTimeout(() => {
            fruits.push(new Fruit());
          }, i * 200); // Stagger spawns
        }

        // Schedule next spawn
        const nextSpawn = Math.random() * 2000 + 1000; // 1 to 3 seconds
        setTimeout(spawnFruit, nextSpawn);
      }

      function createSplash(x, y, color) {
        for (let i = 0; i < 20; i++) {
          particles.push(new Particle(x, y, color));
        }
      }

      function update() {
        if (!isPlaying) return;

        // Update Trail
        for (let i = trail.length - 1; i >= 0; i--) {
          trail[i].age -= 0.05;
          if (trail[i].age <= 0) {
            trail.splice(i, 1);
          }
        }

        let slicedThisFrame = 0;

        // Update Fruits
        for (let i = fruits.length - 1; i >= 0; i--) {
          let f = fruits[i];
          f.update();

          // Remove if out of bounds (well below screen)
          if (f.y > height + 200) {
            fruits.splice(i, 1);
            continue;
          }

          // Collision detection if not sliced
          if (!f.isSliced && lastMouse.x !== 0) {
            const distSq = distToSegmentSquared(
              { x: f.x, y: f.y },
              lastMouse,
              mouse,
            );
            if (distSq <= f.radius * f.radius) {
              // Sliced!
              f.isSliced = true;
              f.vy = -3; // Bounce up a little
              f.halfVX = 1; // Start separation
              slicedThisFrame++;
              score += 10;
              scoreElement.innerText = score;

              createSplash(f.x, f.y, f.type.color);
            }
          }
        }

        if (slicedThisFrame > 1) {
          showCombo(slicedThisFrame);
          score += slicedThisFrame * 5; // Bonus
          scoreElement.innerText = score;
        }

        // Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          if (particles[i].life <= 0) {
            particles.splice(i, 1);
          }
        }

        // Clear last mouse if not moving to avoid slicing without moving
        lastMouse = { ...mouse };
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);

        // Draw Particles behind fruits
        particles.forEach((p) => p.draw(ctx));

        // Draw Fruits
        fruits.forEach((f) => f.draw(ctx));

        // Draw Blade Trail
        if (trail.length > 1) {
          ctx.beginPath();
          ctx.moveTo(trail[0].x, trail[0].y);
          for (let i = 1; i < trail.length; i++) {
            // Smooth curve
            const xc = (trail[i].x + trail[i - 1].x) / 2;
            const yc = (trail[i].y + trail[i - 1].y) / 2;
            ctx.quadraticCurveTo(trail[i - 1].x, trail[i - 1].y, xc, yc);
          }
          ctx.lineTo(trail[trail.length - 1].x, trail[trail.length - 1].y);

          ctx.lineCap = "round";
          ctx.lineJoin = "round";

          // Outer glow
          ctx.lineWidth = 12;
          ctx.strokeStyle = "rgba(0, 255, 204, 0.3)";
          ctx.stroke();

          // Inner core
          ctx.lineWidth = 4;
          ctx.strokeStyle = "#fff";
          ctx.stroke();
        }
      }

      function loop() {
        update();
        draw();
        animationId = requestAnimationFrame(loop);
      }

      function startGame() {
        startScreen.classList.add("hidden");
        isPlaying = true;
        score = 0;
        scoreElement.innerText = score;
        fruits = [];
        particles = [];
        trail = [];

        spawnFruit();

        if (!animationId) {
          loop();
        }
      }

      startBtn.addEventListener("click", startGame);

      // Start loop just to render background/UI nicely before game starts
      draw();
    </script>
  </body>
</html>
