<!doctype html>
<html class="light" lang="zh-TW">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>論壇 - 亂語分享</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        body { background-color: #d9ffee; font-family: 'Inter', sans-serif; }
        .forum-card { transition: transform 0.2s, box-shadow 0.2s; }
        .forum-card:hover { transform: translateY(-4px); box-shadow: 0 18px 35px rgba(0, 105, 68, 0.12); }
        .liked .material-symbols-outlined { font-variation-settings: "FILL" 1, "wght" 500, "GRAD" 0, "opsz" 24; }

        @keyframes pop-up {
            0% { transform: scale(0.9); opacity: 0; }
            70% { transform: scale(1.04); opacity: 1; }
            100% { transform: scale(1); }
        }

        .animate-pop-up { animation: pop-up 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>

<body class="p-4 md:p-8">
    <div id="report-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-pop-up">
            <div class="p-6">
                <h3 class="text-xl font-bold text-[#006944] mb-4 flex items-center">
                    <span class="material-symbols-outlined mr-2">report</span>
                    檢舉這篇內容
                </h3>

                <div class="space-y-4">
                    <p class="text-sm text-gray-500">請選擇檢舉原因，管理員會依紀錄進行審查。</p>
                    <div class="grid grid-cols-1 gap-2" id="reason-options">
                        <label class="flex items-center p-3 border rounded-xl hover:bg-gray-50 cursor-pointer transition-colors">
                            <input type="radio" name="report-reason" value="不當言論" class="mr-3">
                            不當言論
                        </label>
                        <label class="flex items-center p-3 border rounded-xl hover:bg-gray-50 cursor-pointer transition-colors">
                            <input type="radio" name="report-reason" value="色情暴力" class="mr-3">
                            色情暴力
                        </label>
                        <label class="flex items-center p-3 border rounded-xl hover:bg-gray-50 cursor-pointer transition-colors">
                            <input type="radio" name="report-reason" value="垃圾訊息" class="mr-3">
                            垃圾訊息
                        </label>
                        <label class="flex items-center p-3 border rounded-xl hover:bg-gray-50 cursor-pointer transition-colors">
                            <input type="radio" name="report-reason" value="其他" id="other-radio" class="mr-3">
                            其他
                        </label>
                    </div>

                    <textarea id="other-reason-input"
                        class="w-full border rounded-xl p-3 text-sm hidden focus:ring-2 focus:ring-[#006944] outline-none"
                        placeholder="請簡短說明檢舉原因" rows="3"></textarea>
                </div>
            </div>

            <div class="bg-gray-50 p-4 flex justify-end gap-3">
                <button type="button" onclick="closeReportModal()" class="px-5 py-2 text-gray-500 font-bold">取消</button>
                <button type="button" id="submit-report-btn" class="px-6 py-2 bg-[#006944] text-white rounded-full font-bold shadow-md hover:bg-[#005c3b] transition-all">
                    提交檢舉
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-[#006944]">亂語論壇</h1>
                <p class="text-[#306554]">看看大家分享的精選亂語。</p>
            </div>
            <a href="interface.html" class="flex items-center text-[#006944] font-bold">
                <span class="material-symbols-outlined mr-1">arrow_back</span>
                回主頁
            </a>
        </div>

        <section id="admin-report-section" class="hidden mb-8">
            <div class="flex items-center justify-between mb-4 gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-[#006944] flex items-center">
                        <span class="material-symbols-outlined mr-2">admin_panel_settings</span>
                        檢舉審核
                    </h2>
                    <p class="text-sm text-[#306554]">同意檢舉會把文章從論壇移除；駁回後文章會繼續保留。</p>
                </div>
                <button type="button" onclick="fetchReports()" class="px-4 py-2 rounded-full bg-white text-[#006944] font-bold shadow-sm hover:bg-[#f5fffa]">
                    重新整理
                </button>
            </div>
            <div id="report-list" class="space-y-4">
                <div class="text-center py-8 opacity-50">載入檢舉資料中...</div>
            </div>
        </section>

        <section class="mb-8">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-2xl font-bold text-[#006944] flex items-center">
                        <span class="material-symbols-outlined mr-2">favorite</span>
                        今日人氣前三名
                    </h2>
                    <p class="text-sm text-[#306554]">依照今天收到的愛心數排名。</p>
                </div>
            </div>
            <div id="top-liked-list" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="col-span-full text-center py-8 opacity-50">載入排行榜中...</div>
            </div>
        </section>

        <div id="forum-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-full text-center py-20 opacity-50">載入中...</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:3000";
        let currentReportId = null;

        function getCurrentUser() {
            const userData = localStorage.getItem("currentUser");
            if (!userData) return null;

            try {
                return JSON.parse(userData);
            } catch (error) {
                return null;
            }
        }

        function isAdminUser(user) {
            return Number(user?.admin) === 1 || user?.admin === true;
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        async function fetchLikeMap(posts) {
            const ids = posts.map((post) => Number(post.gibberish_id)).filter(Boolean);
            if (!ids.length) return new Map();

            const currentUser = getCurrentUser();
            const query = new URLSearchParams({
                gibberish_ids: ids.join(","),
            });

            if (currentUser?.user_id) {
                query.set("user_id", currentUser.user_id);
            }

            const response = await fetch(`${API_BASE_URL}/report/likes?${query.toString()}`);
            const result = await response.json();
            if (!response.ok || !result.success) return new Map();

            return new Map(result.likes.map((like) => [Number(like.gibberish_id), like]));
        }

        async function fetchForumPosts() {
            const listContainer = document.getElementById("forum-list");

            try {
                const response = await fetch(`${API_BASE_URL}/forum`);
                if (!response.ok) throw new Error("Failed to fetch forum posts");

                const posts = await response.json();

                if (!posts.length) {
                    listContainer.innerHTML = '<div class="col-span-full text-center py-20 opacity-50">目前還沒有精選文章。</div>';
                    return;
                }

                const likeMap = await fetchLikeMap(posts);
                listContainer.innerHTML = "";

                posts.forEach((post) => {
                    const gibberishId = Number(post.gibberish_id);
                    const likeInfo = likeMap.get(gibberishId) || { like_count: 0, liked_by_me: false };
                    const likedClass = likeInfo.liked_by_me ? "liked text-red-500" : "text-gray-400";
                    const card = document.createElement("div");
                    card.className = "forum-card bg-white p-6 rounded-2xl shadow-md border border-white/50 flex flex-col justify-between";
                    card.innerHTML = `
                        <div>
                            <div class="flex items-center gap-2 mb-4">
                                <span class="material-symbols-outlined text-gray-400">account_circle</span>
                                <span class="font-bold text-sm text-[#306554]">${escapeHtml(post.user_name)}</span>
                                <span class="text-[10px] text-gray-400">${new Date(post.created_at).toLocaleDateString()}</span>
                            </div>
                            <p class="text-lg text-[#003629] leading-relaxed mb-6">${escapeHtml(post.content)}</p>
                        </div>
                        <div class="flex justify-between items-center mt-4 border-t pt-4">
                            <button type="button" onclick="toggleLike(${gibberishId})" class="like-button flex items-center gap-1 ${likedClass} hover:text-red-500" data-gibberish-id="${gibberishId}">
                                <span class="material-symbols-outlined text-xl">favorite</span>
                                <span class="like-count text-sm font-bold">${Number(likeInfo.like_count)}</span>
                            </button>
                            <button type="button" onclick="openReportModal(${gibberishId})" class="flex items-center text-xs text-red-500 hover:text-red-700">
                                <span class="material-symbols-outlined text-sm mr-1">report</span>
                                檢舉
                            </button>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (error) {
                listContainer.innerHTML = '<div class="col-span-full text-center py-20 text-red-500">論壇載入失敗，請確認後端 /forum 是否正常。</div>';
            }
        }

        async function fetchTopLikedToday() {
            const listContainer = document.getElementById("top-liked-list");

            try {
                const currentUser = getCurrentUser();
                const query = new URLSearchParams();
                if (currentUser?.user_id) {
                    query.set("user_id", currentUser.user_id);
                }

                const response = await fetch(`${API_BASE_URL}/report/top-liked-today?${query.toString()}`);
                const result = await response.json();
                if (!response.ok || !result.success) throw new Error(result.message || "Failed to fetch ranking");

                if (!result.rankings.length) {
                    listContainer.innerHTML = '<div class="col-span-full text-center py-8 opacity-50">今天還沒有任何點讚。</div>';
                    return;
                }

                listContainer.innerHTML = "";
                result.rankings.forEach((item) => {
                    const medal = item.rank === 1 ? "🥇" : item.rank === 2 ? "🥈" : "🥉";
                    const rankColor = item.rank === 1
                        ? "bg-yellow-100 text-yellow-700"
                        : item.rank === 2
                            ? "bg-gray-100 text-gray-600"
                            : "bg-orange-100 text-orange-700";
                    const likedClass = item.liked_by_me ? "liked text-red-500" : "text-gray-400";
                    const gibberishId = Number(item.gibberish_id);
                    const card = document.createElement("div");
                    card.className = "bg-white rounded-2xl shadow-sm border border-white/60 p-5";
                    card.innerHTML = `
                        <div class="flex items-center justify-between mb-3">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${rankColor}">${medal} 第 ${Number(item.rank)} 名</span>
                            <button type="button" onclick="toggleLike(${gibberishId})" class="like-button flex items-center gap-1 ${likedClass} hover:text-red-500 font-bold" data-gibberish-id="${gibberishId}">
                                <span class="material-symbols-outlined text-lg">favorite</span>
                                <span class="like-count">${Number(item.like_count)}</span>
                            </button>
                        </div>
                        <p class="text-[#003629] leading-relaxed mb-3">${escapeHtml(item.content)}</p>
                        <p class="text-xs text-gray-500">作者：${escapeHtml(item.user_name || "未知作者")}</p>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (error) {
                listContainer.innerHTML = '<div class="col-span-full text-center py-8 text-red-500">排行榜載入失敗。</div>';
            }
        }

        async function toggleLike(gibberishId) {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                alert("請先登入再點讚");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/report/likes/toggle`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_id: currentUser.user_id,
                        gibberish_id: gibberishId,
                    }),
                });

                const result = await response.json();
                if (!response.ok || !result.success) throw new Error(result.message || "Like failed");

                document.querySelectorAll(`.like-button[data-gibberish-id="${gibberishId}"]`).forEach((button) => {
                    button.classList.toggle("liked", result.liked);
                    button.classList.toggle("text-red-500", result.liked);
                    button.classList.toggle("text-gray-400", !result.liked);
                    button.querySelector(".like-count").textContent = result.like_count;
                });
                await fetchTopLikedToday();
            } catch (error) {
                alert("點讚失敗，請稍後再試");
            }
        }

        async function fetchReports() {
            const currentUser = getCurrentUser();
            const reportList = document.getElementById("report-list");

            if (!isAdminUser(currentUser)) return;

            reportList.innerHTML = '<div class="text-center py-8 opacity-50">載入檢舉資料中...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/report?admin_id=${currentUser.user_id}`);
                const result = await response.json();
                if (!response.ok) throw new Error(result.message || "Failed to fetch reports");

                if (!result.reports.length) {
                    reportList.innerHTML = '<div class="text-center py-8 opacity-50">目前沒有待審核檢舉。</div>';
                    return;
                }

                reportList.innerHTML = "";
                result.reports.forEach((report) => {
                    const item = document.createElement("div");
                    item.className = "bg-white border border-white/60 rounded-2xl shadow-sm p-5";
                    item.innerHTML = `
                        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                            <div class="space-y-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 font-bold">待審核</span>
                                    <span class="text-xs text-gray-400">#${Number(report.report_id)}</span>
                                </div>
                                <p class="text-sm text-gray-500">檢舉人：${escapeHtml(report.reporter_name || "未知使用者")}</p>
                                <p class="text-sm text-gray-500">文章作者：${escapeHtml(report.author_name || "未知作者")}</p>
                                <p class="text-sm font-bold text-red-600">原因：${escapeHtml(report.reason)}</p>
                                <p class="text-[#003629] bg-[#f5fffa] rounded-xl p-3">${escapeHtml(report.content || "文章已不存在")}</p>
                                <p class="text-xs text-gray-400">${new Date(report.created_at).toLocaleString()}</p>
                            </div>
                            <div class="flex md:flex-col gap-2 shrink-0">
                                <button type="button" onclick="updateReportStatus(${Number(report.report_id)}, 'resolved')" class="px-4 py-2 rounded-full bg-[#006944] text-white text-sm font-bold hover:bg-[#005c3b]">同意檢舉並移除</button>
                                <button type="button" onclick="updateReportStatus(${Number(report.report_id)}, 'rejected')" class="px-4 py-2 rounded-full bg-red-50 text-red-600 text-sm font-bold hover:bg-red-100">駁回檢舉</button>
                            </div>
                        </div>
                    `;
                    reportList.appendChild(item);
                });
            } catch (error) {
                reportList.innerHTML = '<div class="text-center py-8 text-red-500">檢舉資料載入失敗，請確認管理員權限與 /report API。</div>';
            }
        }

        async function updateReportStatus(reportId, status) {
            const currentUser = getCurrentUser();
            if (!isAdminUser(currentUser)) {
                alert("只有管理員可以審核檢舉");
                return;
            }

            const actionText = status === "resolved" ? "同意檢舉並從論壇移除這篇文章" : "駁回檢舉並保留這篇文章";
            if (!confirm(`確定要${actionText}嗎？`)) return;

            try {
                const response = await fetch(`${API_BASE_URL}/report/${reportId}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        admin_id: currentUser.user_id,
                        status,
                    }),
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.message || "Update failed");

                await fetchReports();
                await fetchForumPosts();
            } catch (error) {
                alert("更新檢舉狀態失敗");
            }
        }

        function openReportModal(gibberishId) {
            currentReportId = gibberishId;
            document.getElementById("report-modal").classList.remove("hidden");
            document.getElementById("report-modal").classList.add("flex");
            document.querySelectorAll('input[name="report-reason"]').forEach((input) => {
                input.checked = false;
            });
            document.getElementById("other-reason-input").value = "";
            document.getElementById("other-reason-input").classList.add("hidden");
        }

        function closeReportModal() {
            document.getElementById("report-modal").classList.add("hidden");
            document.getElementById("report-modal").classList.remove("flex");
            currentReportId = null;
        }

        document.getElementById("reason-options").addEventListener("change", (event) => {
            const otherInput = document.getElementById("other-reason-input");
            if (event.target.id === "other-radio") {
                otherInput.classList.remove("hidden");
                otherInput.focus();
            } else {
                otherInput.classList.add("hidden");
                otherInput.value = "";
            }
        });

        document.getElementById("submit-report-btn").addEventListener("click", async () => {
            const selectedRadio = document.querySelector('input[name="report-reason"]:checked');
            if (!selectedRadio) {
                alert("請選擇檢舉原因");
                return;
            }

            let finalReason = selectedRadio.value;
            if (finalReason === "其他") {
                finalReason = document.getElementById("other-reason-input").value.trim();
                if (!finalReason) {
                    alert("請填寫其他檢舉原因");
                    return;
                }
            }

            const currentUser = getCurrentUser();
            if (!currentUser) {
                alert("請先登入再檢舉");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/report`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        reporter_id: currentUser.user_id,
                        gibberish_id: currentReportId,
                        reason: finalReason,
                    }),
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.message || "Report failed");

                alert("檢舉已送出，感謝你的回報");
                closeReportModal();
                await fetchReports();
            } catch (error) {
                alert("檢舉送出失敗，請稍後再試");
            }
        });

        fetchForumPosts();
        fetchTopLikedToday();

        const currentUser = getCurrentUser();
        if (isAdminUser(currentUser)) {
            document.getElementById("admin-report-section").classList.remove("hidden");
            fetchReports();
        }
    </script>
</body>
</html>
