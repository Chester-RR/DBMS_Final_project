<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#006944",
              "primary-dim": "#005c3b",
              surface: "#d9ffee",
              "surface-container-low": "#c0fee5",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#a9f1d6",
              "on-surface": "#003629",
              "on-surface-variant": "#306554",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            fontFamily: {
              headline: ["Manrope"],
              label: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      body { font-family: "Inter", sans-serif; }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .playful {
        font-family: "Comic Neue", cursive;
        display: inline-block;
        transform: rotate(-3deg) translateY(-2px);
      }
      #eye-icon {
        transition: opacity 0.15s ease-in-out;
      }
      .btn-spring-active:active {
        transform: scale(0.95);
        background-color: #005c3b !important;
        transition: none;
      }
      .btn-spring-return {
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes pop {
        0% { transform: scale(1); }
        40% { transform: scale(1.08); }
        100% { transform: scale(1.03); }
      }
      .clicked { animation: pop 0.25s ease-out; }
    </style>
  </head>

  <body class="bg-surface text-on-surface min-h-screen flex flex-col selection:bg-primary selection:text-white">
    <main class="flex-grow flex items-center justify-center bg-surface-container-low px-4 sm:px-6 lg:px-8">
      <div class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl p-8 sm:p-12 shadow-[0px_12px_32px_rgba(44,52,55,0.06)]">
        <div class="mb-8 text-center">
          <h1 class="font-headline text-[2rem] font-extrabold text-on-surface mb-2 leading-tight">
            While AI thinks
          </h1>
          <p class="text-sm text-on-surface-variant font-medium">
            <span class="playful"><strong>Mess around with words</strong></span>
          </p>
        </div>

        <div class="grid grid-cols-2 gap-2 rounded-full bg-gray-100 p-1 mb-8">
          <button id="login-tab" type="button" class="rounded-full bg-primary px-4 py-2 text-sm font-bold text-white">
            登入
          </button>
          <button id="signup-tab" type="button" class="rounded-full px-4 py-2 text-sm font-bold text-on-surface-variant">
            註冊
          </button>
        </div>

        <form id="auth-form" class="space-y-6">
          <div id="name-field" class="space-y-2 hidden">
            <label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant opacity-80" for="name">
              使用者名稱
            </label>
            <input
              class="w-full bg-gray-200 border-none rounded-lg px-5 py-4 text-on-surface text-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 outline-none"
              id="name"
              name="name"
              type="text"
              autocomplete="username"
            />
          </div>

          <div class="space-y-2">
            <label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant opacity-80" for="email">
              Email
            </label>
            <input
              required
              class="w-full bg-gray-200 border-none rounded-lg px-5 py-4 text-on-surface text-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 outline-none"
              id="email"
              name="email"
              type="email"
              autocomplete="email"
            />
          </div>

          <div class="space-y-2">
            <label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant opacity-80" for="password">
              Password
            </label>
            <div class="relative group">
              <input
                required
                class="w-full bg-gray-200 border-none rounded-lg px-5 py-4 pr-14 text-on-surface text-lg focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 outline-none"
                id="password"
                name="password"
                placeholder="••••••••"
                type="password"
                autocomplete="current-password"
              />
              <button
                class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-50 hover:opacity-100 transition-opacity"
                id="password-toggle"
                type="button"
              >
                <span class="material-symbols-outlined" id="eye-icon">visibility</span>
              </button>
            </div>
          </div>

          <div class="pt-4">
            <button
              id="submit-btn"
              class="w-full bg-primary text-white font-headline text-base font-bold py-4 rounded-full btn-spring-return btn-spring-active disabled:opacity-60"
              type="submit"
            >
              Login
            </button>
          </div>
        </form>

        <div class="mt-8 text-center">
          <p class="text-sm text-on-surface-variant">
            <span id="mode-text">Don't have an account?</span>
            <button id="mode-toggle" type="button" class="font-bold text-primary hover:text-primary-dim underline decoration-primary/30 underline-offset-4 transition-all">
              Sign Up
            </button>
          </p>
        </div>
      </div>
    </main>

    <script>
      const API_BASE_URL = "http://localhost:3000";
      const passwordInput = document.getElementById("password");
      const toggleBtn = document.getElementById("password-toggle");
      const eyeIcon = document.getElementById("eye-icon");
      const authForm = document.getElementById("auth-form");
      const submitBtn = document.getElementById("submit-btn");
      const loginTab = document.getElementById("login-tab");
      const signupTab = document.getElementById("signup-tab");
      const nameField = document.getElementById("name-field");
      const nameInput = document.getElementById("name");
      const modeText = document.getElementById("mode-text");
      const modeToggle = document.getElementById("mode-toggle");

      let mode = "login";

      function setMode(nextMode) {
        mode = nextMode;
        const isSignup = mode === "signup";

        nameField.classList.toggle("hidden", !isSignup);
        nameInput.required = isSignup;
        passwordInput.autocomplete = isSignup ? "new-password" : "current-password";
        submitBtn.textContent = isSignup ? "Sign Up" : "Login";
        modeText.textContent = isSignup ? "Already have an account?" : "Don't have an account?";
        modeToggle.textContent = isSignup ? "Login" : "Sign Up";

        loginTab.className = isSignup
          ? "rounded-full px-4 py-2 text-sm font-bold text-on-surface-variant"
          : "rounded-full bg-primary px-4 py-2 text-sm font-bold text-white";
        signupTab.className = isSignup
          ? "rounded-full bg-primary px-4 py-2 text-sm font-bold text-white"
          : "rounded-full px-4 py-2 text-sm font-bold text-on-surface-variant";
      }

      toggleBtn.addEventListener("click", () => {
        const isPassword = passwordInput.getAttribute("type") === "password";
        passwordInput.setAttribute("type", isPassword ? "text" : "password");
        eyeIcon.style.opacity = "0";
        setTimeout(() => {
          eyeIcon.textContent = isPassword ? "visibility_off" : "visibility";
          eyeIcon.style.opacity = "1";
        }, 100);
      });

      loginTab.addEventListener("click", () => setMode("login"));
      signupTab.addEventListener("click", () => setMode("signup"));
      modeToggle.addEventListener("click", () => setMode(mode === "login" ? "signup" : "login"));

      authForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        submitBtn.classList.add("clicked");
        submitBtn.disabled = true;
        setTimeout(() => submitBtn.classList.remove("clicked"), 250);

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const name = document.getElementById("name").value.trim();
        const url = mode === "signup" ? `${API_BASE_URL}/user/signup` : `${API_BASE_URL}/user/login`;
        const body = mode === "signup" ? { name, email, password } : { email, password };

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          const data = await response.json();

          if (!response.ok || !data.success) {
            throw new Error(data.message || "操作失敗");
          }

          if (mode === "signup") {
            alert("註冊成功，請用剛剛的帳號登入");
            setMode("login");
            return;
          }

          localStorage.setItem("currentUser", JSON.stringify(data.user));
          window.location.href = "interface.html";
        } catch (error) {
          alert(error.message || "後端沒有回應，請確認伺服器已啟動");
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
